<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Records{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --bg: oklch(98% 0.006 275);
            --surface: oklch(99.2% 0.003 275);
            --border: oklch(91% 0.012 275);
            --text: oklch(24% 0.025 275);
            --text-muted: oklch(48% 0.02 275);
            --accent: oklch(53% 0.16 280);
            --accent-hover: oklch(46% 0.17 280);
            --accent-soft: oklch(94% 0.03 280);
            --danger: oklch(56% 0.16 25);
            --danger-soft: oklch(95% 0.03 25);
            --radius-lg: 1.1rem;
            --radius-md: 0.7rem;
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            font-weight: 450;
            letter-spacing: -0.005em;
        }

        h1, h2, h3, h4, .brand {
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            border-radius: 0.6rem;
            background: var(--accent);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.95rem;
        }

        .page-shell {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 1.25rem 4rem;
        }

        .eyebrow {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .page-title {
            font-size: clamp(1.75rem, 3vw, 2.35rem);
            margin: 0.2rem 0 0.4rem;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 0;
        }

        .btn {
            font-weight: 600;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.2s ease, box-shadow 0.2s ease;
        }
        .btn:active { transform: scale(0.97); }

        .btn-accent {
            background: var(--accent);
            border: none;
            color: white;
            border-radius: 999px;
            padding: 0.65rem 1.4rem;
        }
        .btn-accent:hover { background: var(--accent-hover); color: white; }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 999px;
            padding: 0.6rem 1.3rem;
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: 0.6rem;
            border: 1px solid var(--border);
            background: var(--surface);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }
        .icon-btn:hover {
            background: var(--accent-soft);
            color: var(--accent);
            border-color: var(--accent-soft);
        }
        .icon-btn.danger:hover {
            background: var(--danger-soft);
            color: var(--danger);
            border-color: var(--danger-soft);
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
        }

        .form-control, .form-select {
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.85rem 1rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        .form-floating > label {
            color: var(--text-muted);
        }

        a { text-decoration: none; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand py-3">
    <div class="page-shell d-flex justify-content-between align-items-center py-0" style="padding-top:0; padding-bottom:0;">
        <a href="{% url 'home' %}" class="d-flex align-items-center gap-2 brand" style="color: var(--text);">
            <span class="brand-mark">S</span>
            <span>Student Records</span>
        </a>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

</body>
</html>
